name: Deploy Sphinx documentation to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers when you push to main
  workflow_dispatch:   # Allows you to run it manually from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx_autodoc_typehints sphinx_rtd_theme 
          
          # If your docs use autodoc to pull docstrings from your code, 
          # you also need to install your package:
          pip install -e .

      - name: Build HTML
        run: |
          # Navigate to your docs folder and build
          cd docsrc
          sh build_docs.sh
          # Note: If you don't use 'make', the command is:
          # sphinx-build -b html . _build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tell GitHub exactly which folder to host
          # This is usually docs/_build/html or docs/build/html
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4